<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>✨ ToDo List</h1>
        <div class="input-box">
            <input type="text" id="taskInput" placeholder="Add a new task..." />
            <button onclick="addTask()">+ Add</button>
        </div>
        <p id="errorMsg" class="error-msg"></p>
        <ul id="taskList"></ul>
    </div>

    <div class="bottom-actions">
        <button id="checkAllBtn" onclick="checkAll()">Check All</button>
        <button id="deleteBtn" onclick="deleteAll()">Delete All</button>
    </div>

    <div id="overlay" class="overlay">
        <div id="modal-content" class="modal-card">
            <div class="modal-header">
                <h2>All Tasks ✨</h2>
            </div>
            <div id="focused-tasks-list" class="tasks-scroll-area"></div>
            <div class="modal-footer">
                <button onclick="closeTasksModal()" class="close-modal-btn">Close</button>
            </div>
        </div>
    </div>

    <div id="editOverlay" class="overlay">
        <div class="modal-card">
            <h3>Edit Task 📝</h3>
            <input type="text" id="editTaskInput" class="task-input-style">
            <div class="modal-footer" style="margin-top: 20px;">
                <button id="saveEditBtn" class="close-modal-btn">Save Changes</button>
                <button onclick="closeEditModal()" class="btn-secondary" style="background: #ccc; color: black;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="deleteConfirmOverlay" class="overlay">
        <div class="modal-card">
            <h3>Are you sure? ⚠️</h3>
            <p style="color: #636e72; margin: 15px 0;">This will permanently delete all your tasks. Do you want to proceed?</p>
            <div class="modal-footer" style="margin-top: 20px;">
                <button id="confirmDeleteBtn" class="close-modal-btn" style="background: linear-gradient(135deg, #ff4d6d, #e63946);">Yes, Delete All</button>
                <button onclick="closeDeleteModal()" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
